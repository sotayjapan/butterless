<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐĂNG NHẬP | HỆ THỐNG ĐẦU TƯ BUTTERLESS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --gold: #FFD700;
            --gold-gradient: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            --bg: #050505;
            --card: #111111;
            --border: rgba(255, 215, 0, 0.2);
            --text-dim: #888888;
        }

        /* --- NỀN TẢNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- HIỆU ỨNG HẠT CHẠY NỀN --- */
        #login-canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.4; }

        /* --- KHỐI ĐĂNG NHẬP --- */
        .login-container {
            width: 90%; max-width: 400px; padding: 40px 30px;
            background: rgba(17, 17, 17, 0.9);
            border-radius: 40px; border: 1px solid var(--border);
            backdrop-filter: blur(20px); z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .logo-area { margin-bottom: 35px; }
        .logo-area i { 
            font-size: 50px; color: var(--gold); 
            filter: drop-shadow(0 0 15px var(--gold));
            margin-bottom: 15px;
        }
        .logo-area h1 { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 3px; color: #fff; }
        .logo-area p { font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase; margin-top: 5px; }

        /* --- INPUT FIELDS --- */
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group label { 
            display: block; font-size: 11px; color: var(--text-dim); 
            margin-bottom: 8px; font-weight: 700; padding-left: 5px;
        }
        .input-group i {
            position: absolute; left: 20px; bottom: 18px; color: var(--gold); font-size: 18px;
        }
        .input-group input {
            width: 100%; padding: 18px 20px 18px 55px;
            background: #000; border: 1px solid #222; border-radius: 20px;
            color: #fff; font-size: 15px; font-weight: 600;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(255,215,0,0.1); }

        /* --- NÚT BẤM --- */
        .btn-login {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--gold-gradient); color: #000;
            font-weight: 900; font-size: 15px; font-family: 'Orbitron';
            cursor: pointer; margin-top: 10px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255,215,0,0.2);
        }
        .btn-login:active { transform: scale(0.96); }

        .footer-links { margin-top: 30px; font-size: 13px; color: var(--text-dim); }
        .footer-links a { color: var(--gold); text-decoration: none; font-weight: 800; }

        /* --- THÔNG BÁO LỖI --- */
        #error-msg {
            background: rgba(255, 77, 77, 0.1); color: #ff4d4d;
            padding: 12px; border-radius: 12px; font-size: 12px;
            margin-bottom: 20px; display: none; border: 1px solid rgba(255,77,77,0.2);
        }

        /* --- LOADING --- */
        .loader {
            width: 20px; height: 20px; border: 3px solid #000; border-top: 3px solid transparent;
            border-radius: 50%; display: none; animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="login-canvas"></canvas>

    <div class="login-container animate__animated animate__fadeInUp">
        <div class="logo-area">
            <i class="fas fa-shield-bolt"></i>
            <h1>BUTTERLESS</h1>
            <p>Hệ Thống Quantum AI v5.0</p>
        </div>

        <div id="error-msg"></div>

        <div class="input-group">
            <label>SỐ ĐIỆN THOẠI</label>
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="phone" placeholder="Nhập số điện thoại..." autocomplete="off">
        </div>

        <div class="input-group">
            <label>MẬT KHẨU BẢO MẬT</label>
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
        </div>

        <button class="btn-login" id="login-btn" onclick="window.handleLogin()">
            <span id="btn-text">ĐĂNG NHẬP NGAY</span>
            <div class="loader" id="btn-loader"></div>
        </button>

        <div class="footer-links">
            <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            <p style="margin-top: 15px; font-size: 10px; opacity: 0.5;">Hệ thống mã hóa đầu cuối Quantum Secure</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // --- CẤU HÌNH SUPABASE ---
        const SB_URL = 'https://fgartftwimourooudcrp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o';
        const supabase = createClient(SB_URL, SB_KEY);

        // --- HÀM XỬ LÝ ĐĂNG NHẬP (GẮN WINDOW ĐỂ FIX NHẤN) ---
        window.handleLogin = async () => {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');

            // Reset thông báo
            errorDiv.style.display = 'none';

            // Kiểm tra đầu vào
            if (!phone || !password) {
                showError("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            // Hiệu ứng Loading
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                // Truy vấn database
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('phone', phone)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    showError("Số điện thoại hoặc mật khẩu không chính xác!");
                } else {
                    // Đăng nhập thành công
                    localStorage.setItem('user_session', phone);
                    window.location.href = 'index.html';
                }
            } catch (err) {
                showError("Lỗi kết nối máy chủ. Vui lòng thử lại!");
            } finally {
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        };

        function showError(text) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerText = text;
            errorDiv.style.display = 'block';
            errorDiv.classList.add('animate__animated', 'animate__headShake');
        }

        // --- HIỆU ỨNG CANVAS HẠT (DÀNH CHO DÂN CHUYÊN NGHIỆP) ---
        const canvas = document.getElementById('login-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();
    </script>
</body>
</html>
