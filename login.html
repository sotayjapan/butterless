<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREMIUM ACCESS | BUTTERLESS SYSTEM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --gold: #FFD700;
            --gold-dark: #b8860b;
            --gold-light: #fff3a0;
            --bg-dark: #000000;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 215, 0, 0.15);
            --error: #ff4d4d;
            --success: #00ff88;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- BACKGROUND PARTICLES --- */
        #particles-js {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* --- KEYFRAMES ANIMATION --- */
        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* --- MAIN CONTAINER --- */
        .master-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 45px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: glow 5s infinite;
        }

        /* --- TYPOGRAPHY --- */
        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 12px;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        /* --- TAB NAVIGATION --- */
        .auth-nav {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: none;
            color: #777;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 15px;
        }

        .nav-btn.active {
            background: var(--gold);
            color: #000;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        /* --- INPUT GROUPS --- */
        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 18px;
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #222;
            border-radius: 18px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.02);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .input-group input::placeholder {
            color: #444;
            font-size: 14px;
        }

        /* --- CAPTCHA COMPLEX --- */
        .captcha-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .captcha-display {
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), linear-gradient(45deg, #1a1a1a, #333);
            padding: 12px 20px;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 6px;
            text-shadow: 2px 2px 5px #000;
            user-select: none;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        .captcha-display::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px;
            background: var(--gold); opacity: 0.3;
            transform: rotate(-10deg);
        }

        .refresh-btn {
            color: #555;
            cursor: pointer;
            font-size: 20px;
            transition: 0.5s;
        }

        .refresh-btn:hover { color: var(--gold); transform: rotate(180deg); }

        /* --- ACTION BUTTON --- */
        .btn-master {
            width: 100%;
            padding: 22px;
            background: linear-gradient(45deg, #b8860b, #FFD700, #b8860b);
            background-size: 200% auto;
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .btn-master:hover {
            background-position: right center;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.25);
        }

        .btn-master:active { transform: scale(0.98); }

        /* --- SECTIONS --- */
        .auth-section { display: none; }
        .auth-section.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .auth-card { padding: 40px 25px; }
            .brand-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="master-container">
        <div class="auth-card" id="authCard">
            <h1 class="brand-title">BUTTERLESS</h1>

            <div class="auth-nav">
                <button class="nav-btn active" onclick="toggleView('login')">LOGIN</button>
                <button class="nav-btn" onclick="toggleView('register')">REGISTER</button>
            </div>

            <div id="loginSection" class="auth-section active">
                <div class="input-group">
                    <i class="fas fa-phone-alt"></i>
                    <input type="number" id="lPhone" placeholder="Mobile Number">
                </div>
                <div class="input-group">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="lPass" placeholder="Security Password">
                </div>

                <div class="captcha-wrapper">
                    <div class="captcha-display" id="captchaBox">A7B2</div>
                    <i class="fas fa-sync-alt refresh-btn" onclick="initCaptcha()"></i>
                    <input type="text" id="lCaptcha" placeholder="Code" style="width: 100px; padding: 12px; border-radius: 12px; background: #000; border: 1px solid #333; color: #fff; text-align: center;">
                </div>

                <button class="btn-master" onclick="processLogin()">Initialize Access</button>
            </div>

            <div id="registerSection" class="auth-section">
                <div class="input-group">
                    <i class="fas fa-user-plus"></i>
                    <input type="number" id="rPhone" placeholder="Enter New Mobile">
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="rPass" placeholder="Create Secret Key">
                </div>
                <div class="input-group">
                    <i class="fas fa-users"></i>
                    <input type="number" id="rRef" placeholder="Referral ID (Optional)">
                </div>
                <button class="btn-master" onclick="processRegister()" style="background: #fff; color: #000;">Authorize Identity</button>
            </div>

            <div class="footer-note">
                <i class="fas fa-lock" style="color: var(--gold);"></i> 
                ENCRYPTED BY BUTTERLESS QUANTUM SERVERS
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // --- CORE CONFIGURATION ---
        const SUPA_URL = 'https://fgartftwimourooudcrp.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o';
        const supabase = createClient(SUPA_URL, SUPA_KEY);

        let activeCaptcha = "";

        // --- CAPTCHA ENGINE ---
        window.initCaptcha = () => {
            const charset = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let code = "";
            for (let i = 0; i < 4; i++) {
                code += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            activeCaptcha = code;
            document.getElementById('captchaBox').innerText = code;
        };

        // --- UI TOGGLE ---
        window.toggleView = (mode) => {
            const btns = document.querySelectorAll('.nav-btn');
            const sections = document.querySelectorAll('.auth-section');
            
            sections.forEach(s => s.classList.remove('active'));
            btns.forEach(b => b.classList.remove('active'));

            if(mode === 'login') {
                btns[0].classList.add('active');
                document.getElementById('loginSection').classList.add('active');
            } else {
                btns[1].classList.add('active');
                document.getElementById('registerSection').classList.add('active');
            }
        };

        // --- LOGIN HANDLER ---
        window.processLogin = async () => {
            const phone = document.getElementById('lPhone').value;
            const pass = document.getElementById('lPass').value;
            const inputCap = document.getElementById('lCaptcha').value;
            const card = document.getElementById('authCard');

            if(inputCap.toUpperCase() !== activeCaptcha) {
                card.style.animation = 'shake 0.4s';
                alert("SECURITY ALERT: CAPTCHA VERIFICATION FAILED");
                setTimeout(() => card.style.animation = 'glow 5s infinite', 400);
                initCaptcha();
                return;
            }

            const { data: user, error } = await supabase.from('users').select('*').eq('phone', phone).single();

            if (user && user.password === pass) {
                localStorage.setItem('user_session', phone);
                window.location.href = 'index.html';
            } else {
                card.style.animation = 'shake 0.4s';
                alert("ACCESS DENIED: INVALID CREDENTIALS");
                setTimeout(() => card.style.animation = 'glow 5s infinite', 400);
                initCaptcha();
            }
        };

        // --- REGISTER HANDLER ---
        window.processRegister = async () => {
            const phone = document.getElementById('rPhone').value;
            const pass = document.getElementById('rPass').value;
            const ref = document.getElementById('rRef').value;

            if(!phone || !pass) return alert("REQUIRED: INPUTS CANNOT BE EMPTY");

            const { error } = await supabase.from('users').insert([{ 
                phone, password: pass, balance: 0, ref_by: ref || null, is_gift_claimed: false, has_invested: false 
            }]);

            if(!error) {
                alert("IDENTITY REGISTERED SUCCESSFULLY");
                toggleView('login');
            } else {
                alert("ERROR: IDENTITY ALREADY EXISTS IN SYSTEM");
            }
        };

        // --- INITIALIZATION ---
        window.onload = () => {
            initCaptcha();
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#FFD700" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.2, "random": true },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#FFD700", "opacity": 0.1, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } }
                }
            });

            // Auto-fill Ref from URL
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('ref')) {
                toggleView('register');
                document.getElementById('rRef').value = urlParams.get('ref');
            }
        };
    </script>
</body>
</html>
