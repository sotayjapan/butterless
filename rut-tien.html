<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rút Tiền - Butterless Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --bg-main: #050505;
            --bg-card: #111111;
            --text-light: #f5f5f5;
            --text-muted: #888888;
            --red: #ff4d4d;
            --green: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-light); padding-bottom: 30px; }

        .header { display: flex; align-items: center; padding: 15px 20px; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 20px; color: var(--gold); margin-right: 15px; text-decoration: none; }
        .header-title { font-size: 18px; font-weight: bold; }

        .container { padding: 20px; }

        .balance-banner { background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 25px; text-align: center; }
        .balance-banner p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .balance-banner h2 { font-size: 28px; color: var(--gold); letter-spacing: 1px; }

        /* Form Style */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        .input-style { 
            width: 100%; 
            background: var(--bg-card); 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 15px; 
            outline: none; 
            transition: 0.3s;
        }
        .input-style:focus { border-color: var(--gold); background: #161616; }

        /* Custom Select */
        select.input-style { cursor: pointer; color: #fff; }

        .btn-withdraw { 
            width: 100%; 
            background: var(--gold); 
            color: #000; 
            font-weight: 900; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
        }

        /* History Section */
        .history-box { margin-top: 35px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-header h3 { font-size: 15px; color: var(--gold); }
        
        .history-item { 
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
        }
        .history-info h4 { font-size: 13px; margin-bottom: 3px; }
        .history-info p { font-size: 10px; color: var(--text-muted); }
        .history-status { text-align: right; }
        .status-val { font-weight: bold; font-size: 14px; display: block; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-done { background: rgba(46, 204, 113, 0.1); color: var(--green); }
        .badge-wait { background: rgba(255, 215, 0, 0.1); color: var(--gold); }

        .note { font-size: 11px; color: #888; text-align: center; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title">Rút Tiền Nhanh 24/7</div>
    </header>

    <div class="container">
        <div class="balance-banner">
            <p>Số dư khả dụng</p>
            <h2 id="currentBalance">50,000đ</h2>
        </div>

        <div class="form-group">
            <label>Ngân hàng thụ hưởng</label>
            <select class="input-style" id="bankName">
                <option value="">-- Chọn ngân hàng --</option>
                <optgroup label="Phổ biến">
                    <option>Vietcombank</option>
                    <option>MB Bank (Quân Đội)</option>
                    <option>Techcombank</option>
                    <option>VietinBank</option>
                    <option>BIDV</option>
                    <option>Agribank</option>
                </optgroup>
                <optgroup label="Ví điện tử">
                    <option>Ví MoMo</option>
                    <option>ZaloPay</option>
                    <option>Viettel Money</option>
                </optgroup>
                <optgroup label="Ngân hàng khác">
                    <option>ACB (Á Châu)</option>
                    <option>TPBank</option>
                    <option>VPBank</option>
                    <option>Sacombank</option>
                    <option>HDBank</option>
                    <option>VIB</option>
                    <option>SHB</option>
                    <option>Eximbank</option>
                    <option>MSB (Hàng Hải)</option>
                    <option>SeABank</option>
                    <option>Nam A Bank</option>
                    <option>OCB (Phương Đông)</option>
                    <option>PVcomBank</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Số tài khoản</label>
            <input type="number" id="accountNumber" class="input-style" placeholder="VD: 0988xxxxxx">
        </div>

        <div class="form-group">
            <label>Họ và tên chủ tài khoản</label>
            <input type="text" id="accountName" class="input-style" placeholder="VD: NGUYEN VAN A" oninput="this.value = this.value.toUpperCase()">
        </div>

        <div class="form-group">
            <label>Số tiền rút (VNĐ)</label>
            <input type="number" id="withdrawAmount" class="input-style" placeholder="Tối thiểu 100,000đ">
        </div>

        <button class="btn-withdraw" onclick="processWithdraw()">XÁC NHẬN RÚT TIỀN</button>

        <p class="note">Lưu ý: Hệ thống xử lý rút tiền tự động. Tiền sẽ về tài khoản sau 3-5 phút.</p>

        <div class="history-box">
            <div class="history-header">
                <h3>Lịch sử giao dịch</h3>
                <i class="fas fa-filter" style="font-size: 12px; color: #555;"></i>
            </div>
            
            <div class="history-list" id="historyList">
                <div class="history-item">
                    <div class="history-info">
                        <h4>Rút về Vietcombank</h4>
                        <p>Hôm nay, 10:15</p>
                    </div>
                    <div class="history-status">
                        <span class="status-val">-500,000đ</span>
                        <span class="badge badge-done">Thành công</span>
                    </div>
                </div>
                <div class="history-item">
                    <div class="history-info">
                        <h4>Rút về MB Bank</h4>
                        <p>Hôm qua, 22:30</p>
                    </div>
                    <div class="history-status">
                        <span class="status-val">-2,000,000đ</span>
                        <span class="badge badge-wait">Đang duyệt</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function processWithdraw() {
            const bank = document.getElementById('bankName').value;
            const stk = document.getElementById('accountNumber').value;
            const name = document.getElementById('accountName').value;
            const amount = document.getElementById('withdrawAmount').value;

            if(!bank || !stk || !name || !amount) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            if(amount < 50000) {
                alert("Số tiền rút tối thiểu là 50,000đ");
                return;
            }

            alert("Yêu cầu rút " + new Intl.NumberFormat('vi-VN').format(amount) + "đ đã được gửi!\nVui lòng chờ hệ thống kiểm tra.");
            window.location.reload();
        }
    </script>
</body>
</html>
