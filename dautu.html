<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Secure - Đầu Tư VIP 10D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =========================================================
           CORE STYLES & GLASSMORPHISM VIP THEME (BLACK & GOLD)
        ========================================================= */
        :root { 
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --gold-static: #f6d365;
            --green: #00ff88;
            --red: #ff4d4d;
            --bg: #000000;
            --panel: rgba(20, 20, 20, 0.8);
            --card: #121212;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a, #000);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* HIỆU ỨNG CANVAS MƯA TIỀN VÀNG */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        .vip-container { max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }
        
        /* HEADER ĐẲNG CẤP (Giống ảnh gốc nhưng thêm hiệu ứng) */
        .header-profile { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar-crown { 
            width: 45px; height: 45px; 
            background: var(--gold); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            animation: pulse-gold 2s infinite;
        }
        .id-text b { display: block; font-size: 16px; color: #fff; font-weight: 900; }
        .id-text span { font-size: 10px; color: var(--green); letter-spacing: 1px; font-weight: bold; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }

        /* WALLET CARD VIP & HIỆU ỨNG SỐ NHẢY */
        .wallet-card { 
            margin: 0 15px; background: var(--card); border-radius: 25px; 
            padding: 25px; border: 1px solid #222; 
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .wallet-card:hover { border-color: var(--gold-static); transform: translateY(-5px); }
        .wallet-card::after { 
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            animation: rotate-gradient 10s linear infinite;
        }
        .wallet-label { color: #888; font-size: 12px; margin-bottom: 10px; display: block; position: relative; z-index: 1; }
        .balance-value { 
            font-family: 'Orbitron'; font-size: 28px; font-weight: 900; 
            letter-spacing: -1px; margin-bottom: 15px; 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text; color: transparent;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            position: relative; z-index: 1;
        }
        .wallet-actions { display: flex; gap: 12px; position: relative; z-index: 1; }
        .btn-wallet { 
            flex: 1; padding: 12px; border-radius: 15px; border: none; 
            font-weight: 900; font-size: 13px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .btn-nap { background: var(--gold); color: #000; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }
        .btn-nap:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(255,215,0,0.5); }
        .btn-rut { background: #222; color: #fff; border: 1px solid #444; }
        .btn-rut:hover { background: #333; }
        @keyframes rotate-gradient { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* CHART SECTION MATRIX & REAL-TIME CANDLES */
        .chart-section { 
            margin: 20px 15px; background: var(--card); border-radius: 20px; 
            padding: 15px; border: 1px solid #222; position: relative;
        }
        .chart-info { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .symbol { font-size: 14px; font-weight: 900; color: #aaa; font-family: 'Orbitron'; letter-spacing: 1px; }
        .change-percent.up { color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .change-percent.down { color: var(--red); text-shadow: 0 0 10px rgba(255,77,77,0.3); }
        
        .canvas-holder { height: 180px; width: 100%; position: relative; overflow: hidden; }
        #tradingChart { width: 100%; height: 100%; }

        /* ĐƯỜNG CHỈ ENTRY & BADGE TIỀN (Hiệu ứng) */
        #entry-line { 
            position: absolute; left: 0; width: 100%; 
            border-top: 2px dashed #fff; display: none; 
            pointer-events: none; z-index: 5;
            transition: border-color 0.3s;
        }
        .price-tag { 
            position: absolute; right: 5px; top: -20px; 
            color: #000; padding: 4px 10px; border-radius: 4px; 
            font-size: 11px; font-weight: 900; font-family: 'Orbitron'; 
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            animation: slide-in-tag 0.5s forwards;
        }
        @keyframes slide-in-tag { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TRADING PANEL & BẢNG LỆNH CHUYÊN NGHIỆP */
        .trading-panel { padding: 0 15px; margin-bottom: 20px; }
        .input-box { margin-bottom: 15px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #444; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--gold-static); box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .input-box span { display: block; font-size: 10px; color: #777; margin-bottom: 5px; }
        .input-box input { background: transparent; border: none; color: #fff; font-family: 'Orbitron'; font-size: 18px; width: 100%; outline: none; }

        .trade-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-trade { 
            padding: 18px; border-radius: 15px; border: none; 
            font-weight: 900; font-size: 16px; color: #000; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .btn-trade:active { transform: scale(0.95); }
        .btn-buy { background: linear-gradient(90deg, #00ff88, #00bd65); color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
        .btn-buy:hover { box-shadow: 0 6px 20px rgba(0,255,136,0.4); }
        .btn-sell { background: linear-gradient(90deg, #ff4d4d, #c40000); color: #fff; box-shadow: 0 4px 15px rgba(255,77,77,0.2); }
        .btn-sell:hover { box-shadow: 0 6px 20px rgba(255,77,77,0.4); }

        /* BOTTOM NAV (Giống ảnh gốc & VIP) */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px; 
            background: #0a0a0a; display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid #222;
            z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; transition: 0.3s; }
        .nav-item.active { color: #f6d365; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item:hover { color: #fff; }

        /* POPUP KẾT QUẢ ĐỈNH CAO */
        .result-overlay { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); 
            background: rgba(0,0,0,0.95); border: 2px solid var(--gold-static); 
            padding: 30px 50px; border-radius: 20px; z-index: 10000; 
            text-align: center; box-shadow: 0 0 50px rgba(255,215,0,0.5); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .result-overlay.show { transform: translate(-50%, -50%) scale(1); }
        .res-title { font-family: 'Orbitron'; font-size: 30px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .res-win { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        .res-lose { color: #ff4d4d; text-shadow: 0 0 20px #ff4d4d; }
        .res-amt { font-size: 20px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="vip-container">
        <header class="header-profile">
            <div class="user-info">
                <div class="avatar-crown">👑</div>
                <div class="id-text">
                    <b>ID: 0983555789</b>
                    <span>QUANTUM SECURE •</span>
                </div>
            </div>
            <div style="opacity: 0.3;">⏻</div>
        </header>

        <div class="wallet-card">
            <span class="wallet-label">SỐ DƯ KHẢ DỤNG (VND)</span>
            <div class="balance-value" id="user-balance">99,949,989.60</div>
            <div style="font-size: 11px; color: #555; margin-bottom: 15px; position: relative; z-index: 1;">
                🌎 Lợi nhuận: +0% &nbsp; 🛡️ Đã bảo mật
            </div>
            <div class="wallet-actions">
                <a href="nap.html" class="btn-wallet btn-nap">✚ NẠP TIỀN</a>
                <a href="rut.html" class="btn-wallet btn-rut">⊞ RÚT TIỀN</a>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-info">
                <span class="symbol">BITCOIN / VNDT</span>
                <span class="change-percent up" id="live-percent">+2.41%</span>
            </div>
            <div class="canvas-holder">
                <div id="entry-line"><div class="price-tag" id="entry-tag">0đ</div></div>
                <canvas id="tradingChart"></canvas>
            </div>
        </div>

        <div class="trading-panel">
            <div class="input-box">
                <span>SỐ TIỀN ĐẦU TƯ (VND)</span>
                <input type="number" id="betAmount" value="1000000" step="500000">
            </div>
            <div class="trade-controls">
                <button class="btn-trade btn-buy" onclick="handleTrade('BUY')">MUA (LONG)</button>
                <button class="btn-trade btn-sell" onclick="handleTrade('SELL')">BÁN (SHORT)</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active"><i>🏠</i>Trang Chủ</a>
            <a href="lichsu.html" class="nav-item"><i>🕒</i>Lịch Sử</a>
            <a href="index.html" class="nav-item"><i>👥</i>Đội Ngũ</a>
            <a href="profile.html" class="nav-item"><i>👤</i>Cá Nhân</a>
        </nav>
    </div>

    <div class="result-overlay" id="result-popup">
        <div class="res-title" id="res-status">THẮNG LỚN</div>
        <div class="res-amt" id="res-money">+1,000,000 ₫</div>
    </div>

    <script>
        /* =========================================================
           ULTIMATE CASINO ENGINE JAVASCRIPT FIXED & ANIMATED
        ========================================================= */

        // 1. CANVAS PARTICLE SYSTEM (MƯA TIỀN VÀNG 10D)
        const partCanvas = document.getElementById('particle-canvas');
        const partCtx = partCanvas.getContext('2d');
        partCanvas.width = window.innerWidth; partCanvas.height = window.innerHeight;
        let particles = [];

        function createCoinExplosion() {
            particles = [];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: partCanvas.width / 2, y: partCanvas.height / 2,
                    vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.5) * 25 - 8,
                    size: Math.random() * 15 + 10, color: Math.random() > 0.5 ? '#FFD700' : '#ffc107',
                    rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 15
                });
            }
            animateCoins();
        }

        function animateCoins() {
            partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);
            let active = false;
            particles.forEach(p => {
                p.vy += 0.6; // Gravity
                p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
                if(p.y < partCanvas.height + 50) active = true;
                partCtx.save();
                partCtx.translate(p.x, p.y); partCtx.rotate(p.rot * Math.PI / 180);
                partCtx.beginPath(); partCtx.ellipse(0, 0, p.size, p.size/2, 0, 0, Math.PI * 2);
                partCtx.fillStyle = p.color; partCtx.fill();
                partCtx.lineWidth = 2; partCtx.strokeStyle = '#b8860b'; partCtx.stroke();
                partCtx.restore();
            });
            if(active) requestAnimationFrame(animateCoins);
            else partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);
        }

        // 2. STATE MACHINE & LOGIC GAME (NÉ 70% BỊP)
        const canvas = document.getElementById('tradingChart');
        const ctx = canvas.getContext('2d');
        const entryLine = document.getElementById('entry-line');
        const entryTag = document.getElementById('entry-tag');
        
        let candles = [];
        let balance = parseFloat(localStorage.getItem('userBalance')) || 99949989.60;
        let isTrading = false, tradeType = null, entryPrice = 0, currentBetAmt = 0;
        let basePrice = 65000;

        // Khởi tạo kích thước canvas mượt
        function resizeChart() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.onresize = resizeChart; resizeChart();

        // TẠO NẾN REAL-TIME VỚI THUẬT TOÁN "NÉ" 70%
        function generateCandle() {
            const open = candles.length > 0 ? candles[candles.length - 1].close : basePrice;
            let close;

            if (isTrading) {
                // Thuật toán bịp: 70% nến đi ngược lệnh khách
                const rigged = Math.random() < 0.70; 
                const vol = Math.random() * 200;
                if (tradeType === 'BUY') {
                    close = rigged ? open - vol : open + vol;
                } else {
                    close = rigged ? open + vol : open - vol;
                }
            } else {
                // Tự nhiên khi không có lệnh
                close = open + (Math.random() - 0.5) * 120;
            }

            const high = Math.max(open, close) + Math.random() * 30;
            const low = Math.min(open, close) - Math.random() * 30;
            candles.push({ open, close, high, low });
            if (candles.length > 50) candles.shift();
            
            // Cập nhật % trên UI
            updatePercentUI(candles[0].open, close);

            // Cập nhật đường chỉ Entry chạy theo chart
            if (isTrading) updateEntryLinePosition();
        }

        // XỬ LÝ LỆNH MUA/BÁN VỚI HIỆU ỨNG ENTRY LINE
        function handleTrade(type) {
            if (isTrading) return;
            
            const amt = parseFloat(document.getElementById('betAmount').value) || 1000000;
            if (amt > balance) return alert("Không đủ số dư khả dụng!");

            isTrading = true, tradeType = type, currentBetAmt = amt;
            // Lấy giá vào lệnh chuẩn real-time
            entryPrice = candles[candles.length - 1].close; 
            balance -= amt; updateBalanceUI();

            // Hiển thị và tô màu đường chỉ & nhãn tiền
            entryLine.style.display = 'block';
            entryLine.style.borderColor = type === 'BUY' ? '#00ff88' : '#ff4d4d';
            entryTag.style.background = type === 'BUY' ? '#00ff88' : '#ff4d4d';
            entryTag.innerText = (type === 'BUY' ? 'LONG ' : 'SHORT ') + amt.toLocaleString() + 'đ';

            // Sau 15 giây hồi hộp chốt kết quả
            setTimeout(() => {
                const finalPrice = candles[candles.length - 1].close;
                const win = (type === 'BUY' && finalPrice > entryPrice) || 
                            (type === 'SELL' && finalPrice < entryPrice);

                showResultPopup(win, amt);
                
                isTrading = false;
                entryLine.style.display = 'none'; // Ẩn đường chỉ
                updateBalanceUI();
            }, 15000);
        }

        // VỊ TRÍ ĐƯỜNG CHỈ GIÁ (Cập nhật real-time theo tọa độ canvas)
        function updateEntryLinePosition() {
            const min = Math.min(...candles.map(c => c.low)) - 100;
            const max = Math.max(...candles.map(c => c.high)) + 100;
            // 50px là khoảng offset của canvas trong box
            const y = canvas.height - ((entryPrice - min) / (max - min)) * canvas.height;
            entryLine.style.top = y + "px"; 
        }

        function showResultPopup(win, amt) {
            const popup = document.getElementById('result-popup');
            const title = document.getElementById('res-status');
            const amtEl = document.getElementById('res-money');

            if (win) {
                const winAmt = amt * 1.95;
                balance += winAmt;
                title.innerText = "THẮNG LỚN"; title.className = "res-title res-win";
                amtEl.innerText = "+" + winAmt.toLocaleString() + " ₫";
                createCoinExplosion(); // KÍCH HOẠT MƯA TIỀN CANVAS
            } else {
                title.innerText = "RẤT TIẾC"; title.className = "res-title res-lose";
                amtEl.innerText = "-" + amt.toLocaleString() + " ₫";
            }

            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 3000);
        }

        // Cập nhật Giao diện
        function updateBalanceUI() {
            document.getElementById('user-balance').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            localStorage.setItem('userBalance', balance);
        }

        function updatePercentUI(open, close) {
            const diff = ((close - open) / open * 100).toFixed(2);
            const el = document.getElementById('live-percent');
            el.innerText = (diff > 0 ? "+" : "") + diff + "%";
            el.className = "change-percent " + (diff > 0 ? "up" : "down");
        }

        // VẼ BIỂU ĐỒ NẾN 10D MƯỢT MÀ
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (candles.length < 2) return;

            const cw = canvas.width / 55;
            const minPrice = Math.min(...candles.map(c => c.low)) - 50;
            const maxPrice = Math.max(...candles.map(c => c.high)) + 50;
            const range = maxPrice - minPrice;

            candles.forEach((c, i) => {
                const x = i * (cw + 4);
                const isUp = c.close >= c.open;
                const yOpen = canvas.height - ((c.open - minPrice) / range) * canvas.height;
                const yClose = canvas.height - ((c.close - minPrice) / range) * canvas.height;
                ctx.fillStyle = isUp ? "#00ff88" : "#ff4d4d";
                ctx.fillRect(x, Math.min(yOpen, yClose), cw, Math.max(2, Math.abs(yOpen - yClose)));
            });
            requestAnimationFrame(draw);
        }

        // Khởi động
        for(let i=0; i<50; i++) generateCandle();
        setInterval(generateCandle, 2000); // Tạo nến mới mỗi 2 giây
        draw();
        updateBalanceUI();
    </script>
</body>
</html>
