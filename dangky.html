<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐĂNG KÝ HỆ THỐNG | BUTTERLESS QUANTUM V5.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --vàng: #FFD700;
            --vàng-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 50%, #fcf6ba 55%, #aa771c 100%);
            --nền: #050505;
            --thẻ: rgba(15, 15, 15, 0.98);
            --viền: rgba(255, 215, 0, 0.2);
            --chữ-mờ: #777777;
            --xanh: #00ff88;
        }

        /* --- RESET & CHUNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--nền); color: #fff; font-family: 'Inter', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- CANVAS NỀN --- */
        #quantum-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* --- KHỐI ĐĂNG KÝ --- */
        .register-box {
            width: 92%; max-width: 450px; padding: 45px 30px;
            background: var(--thẻ); border-radius: 45px; border: 1.5px solid var(--viền);
            backdrop-filter: blur(25px); z-index: 10;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }

        .register-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--vàng));
            animation: rotateBorder 6s linear infinite; z-index: -1; opacity: 0.1;
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        .logo-section { margin-bottom: 35px; text-align: center; }
        .logo-section i { 
            font-size: 55px; color: var(--vàng); 
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
            margin-bottom: 15px;
        }
        .logo-section h2 { font-family: 'Orbitron'; font-size: 24px; letter-spacing: 4px; }
        .logo-section p { font-size: 10px; color: var(--vàng); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* --- INPUT STYLING --- */
        .input-group { position: relative; margin-bottom: 22px; }
        .input-group label {
            display: block; font-size: 11px; color: var(--chữ-mờ);
            margin-bottom: 8px; font-weight: 700; padding-left: 12px;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: var(--vàng); font-size: 18px;
        }
        .input-wrapper input {
            width: 100%; padding: 18px 20px 18px 55px;
            background: rgba(0,0,0,0.6); border: 1px solid #222; border-radius: 20px;
            color: #fff; font-size: 15px; font-weight: 500; transition: all 0.3s;
        }
        .input-wrapper input:focus {
            border-color: var(--vàng); outline: none; background: #000;
            box-shadow: 0 0 20px rgba(255,215,0,0.1);
        }

        /* --- MẬT KHẨU STRENGTH --- */
        .strength-bar { height: 4px; width: 0%; background: var(--vàng); margin-top: 8px; border-radius: 2px; transition: 0.3s; }

        /* --- NÚT BẤM --- */
        .btn-submit {
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            background: var(--vàng-gradient); color: #000;
            font-weight: 900; font-size: 15px; font-family: 'Orbitron';
            cursor: pointer; margin-top: 15px; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(255,215,0,0.25);
        }
        .btn-submit:active { transform: scale(0.95); }

        /* --- THÔNG BÁO --- */
        .alert-box {
            background: rgba(255, 77, 77, 0.1); color: #ff4d4d;
            padding: 15px; border-radius: 15px; font-size: 13px;
            margin-bottom: 20px; display: none; border: 1px solid rgba(255,77,77,0.2);
            text-align: center; font-weight: 600;
        }

        .success-box {
            background: rgba(0, 255, 136, 0.1); color: var(--xanh);
            padding: 15px; border-radius: 15px; display: none; margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 136, 0.2); text-align: center;
        }

        .loader {
            width: 24px; height: 24px; border: 4px solid #000; border-top: 4px solid transparent;
            border-radius: 50%; display: none; animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer-links { margin-top: 30px; font-size: 14px; color: var(--chữ-mờ); text-align: center; }
        .footer-links a { color: var(--vàng); text-decoration: none; font-weight: 800; }

        /* --- ĐIỀU KHOẢN --- */
        .terms { font-size: 10px; color: #444; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

    <canvas id="quantum-canvas"></canvas>

    <div class="register-box animate__animated animate__zoomIn">
        <div class="logo-section">
            <i class="fas fa-user-shield"></i>
            <h2>BUTTERLESS</h2>
            <p>Hệ Thống Đăng Ký Quantum</p>
        </div>

        <div id="error-msg" class="alert-box"></div>
        <div id="success-msg" class="success-box">Đang khởi tạo tài khoản VIP...</div>

        <div class="input-group">
            <label>SỐ ĐIỆN THOẠI (ID GIAO DỊCH)</label>
            <div class="input-wrapper">
                <i class="fas fa-mobile-alt"></i>
                <input type="tel" id="p-phone" placeholder="Nhập số điện thoại chính chủ..." maxlength="11">
            </div>
        </div>

        <div class="input-group">
            <label>MẬT KHẨU TRUY CẬP</label>
            <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="p-pass" placeholder="Tối thiểu 6 ký tự..." oninput="checkStrength(this.value)">
            </div>
            <div class="strength-bar" id="p-bar"></div>
        </div>

        <div class="input-group">
            <label>MÃ GIỚI THIỆU (NHẬN THÊM ƯU ĐÃI)</label>
            <div class="input-wrapper">
                <i class="fas fa-user-tag"></i>
                <input type="text" id="p-ref" placeholder="Để trống nếu không có mã...">
            </div>
        </div>

        <button class="btn-submit" id="reg-btn" onclick="window.handleRegisterPro()">
            <span id="btn-text">ĐĂNG KÝ & NHẬN 50K</span>
            <div class="loader" id="btn-loader"></div>
        </button>

        <div class="footer-links">
            Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </div>

        <div class="terms">
            Bằng cách nhấn Đăng ký, bạn đồng ý với các điều khoản bảo mật Quantum Secure v5.0 của Butterless.
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // --- CẤU HÌNH SUPABASE ---
        const SB_URL = 'https://fgartftwimourooudcrp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o';
        const supabase = createClient(SB_URL, SB_KEY);

        // --- HÀM KIỂM TRA MẬT KHẨU ---
        window.checkStrength = (v) => {
            const bar = document.getElementById('p-bar');
            if(v.length < 4) bar.style.width = '20%';
            else if(v.length < 8) bar.style.width = '60%';
            else bar.style.width = '100%';
        }

        // --- XỬ LÝ ĐĂNG KÝ CHÍNH (AUTO CỘNG 50K) ---
        window.handleRegisterPro = async () => {
            const phone = document.getElementById('p-phone').value.trim();
            const pass = document.getElementById('p-pass').value.trim();
            const ref = document.getElementById('p-ref').value.trim();
            const err = document.getElementById('error-msg');
            const suc = document.getElementById('success-msg');
            const bTxt = document.getElementById('btn-text');
            const bLd = document.getElementById('btn-loader');

            // Reset UI
            err.style.display = 'none';
            suc.style.display = 'none';

            // Validate nhanh
            if (phone.length < 10) { showError("Số điện thoại không hợp lệ!"); return; }
            if (pass.length < 6) { showError("Mật khẩu phải từ 6 ký tự!"); return; }

            // Loading state
            bTxt.style.display = 'none';
            bLd.style.display = 'block';

            try {
                // 1. Kiểm tra tồn tại
                const { data: check } = await supabase.from('users').select('phone').eq('phone', phone).single();
                
                if (check) {
                    showError("Tài khoản này đã tồn tại trên hệ thống!");
                } else {
                    // 2. TẠO TÀI KHOẢN VỚI SỐ DƯ 50,000đ NGAY LẬP TỨC
                    const { error: insErr } = await supabase.from('users').insert([{
                        phone: phone,
                        password: pass,
                        balance: 50000, // CỘNG TIỀN LUÔN
                        is_gift_claimed: true, // Đã nhận quà
                        has_invested: false,
                        ref_by: ref || 'Hệ thống'
                    }]);

                    if (insErr) {
                        showError("Lỗi khởi tạo database: " + insErr.message);
                    } else {
                        // Thành công
                        suc.style.display = 'block';
                        // Ghi lịch sử nhận quà cho minh bạch
                        await supabase.from('history').insert([{ 
                            phone: phone, type: 'Quà tân thủ (Auto)', amount: 50000, status: 'Thành công' 
                        }]);
                        
                        setTimeout(() => {
                            localStorage.setItem('user_session', phone);
                            window.location.href = 'index.html';
                        }, 1500);
                    }
                }
            } catch (ex) {
                showError("Lỗi kết nối nghiêm trọng!");
            } finally {
                bTxt.style.display = 'block';
                bLd.style.display = 'none';
            }
        };

        function showError(t) {
            const err = document.getElementById('error-msg');
            err.innerText = t;
            err.style.display = 'block';
            err.classList.add('animate__animated', 'animate__headShake');
        }

        // --- HIỆU ỨNG QUANTUM NỀN ---
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 1.5;
                this.vx = Math.random() * 0.4 - 0.2;
                this.vy = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = "rgba(255, 215, 0, 0.4)";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
            }
        }
        for(let i=0; i<60; i++) particles.push(new P());
        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
