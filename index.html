<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERLESS | HỆ THỐNG ĐẦU TƯ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #121212; --green: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; padding-bottom: 120px; }

        /* --- HIỆU ỨNG HỘP QUÀ --- */
        #gift-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 9999; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .gift-box {
            text-align: center; cursor: pointer; animation: giftAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes giftAppear { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
        
        .gift-icon { font-size: 80px; color: var(--gold); filter: drop-shadow(0 0 20px var(--gold)); animation: giftBounce 2s infinite; }
        @keyframes giftBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .gift-txt { margin-top: 20px; font-family: 'Orbitron'; font-weight: 900; color: #fff; letter-spacing: 2px; }

        /* --- HEADER & DASHBOARD --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,215,0,0.1); }
        .wallet-card { margin: 20px; background: linear-gradient(145deg, #1a1a1a, #000); border-radius: 35px; border: 1px solid rgba(255,215,0,0.15); padding: 35px 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .balance-val { font-size: 40px; font-weight: 900; color: #fff; margin: 15px 0; font-family: 'Orbitron'; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-main { padding: 16px; border-radius: 20px; border: none; font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-dark { background: #1a1a1a; color: #fff; border: 1px solid #333; }

        /* --- DANH SÁCH GÓI --- */
        .package-list { padding: 0 20px; display: flex; flex-direction: column; gap: 18px; }
        .p-card { background: var(--card); border-radius: 30px; padding: 25px; border: 1px solid #222; }
        .p-price { font-size: 26px; color: var(--gold); font-weight: 800; margin: 10px 0; }
        .btn-buy { width: 100%; padding: 18px; border-radius: 18px; border: none; background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); font-weight: 900; color: #000; cursor: pointer; }

        /* --- ICON TELEGRAM NHẢY --- */
        .tele-float { position: fixed; bottom: 110px; right: 20px; z-index: 999; }
        .tele-btn { width: 65px; height: 65px; background: #0088cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 30px; animation: bounce 2s infinite; border: 3px solid #fff; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* --- NAVBAR --- */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
        .nav-tab { color: #444; font-size: 22px; text-decoration: none; text-align: center; }
        .nav-tab.active { color: var(--gold); }
        .nav-tab span { display: block; font-size: 10px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="gift-overlay" onclick="claimGift()">
        <div class="gift-box">
            <div class="gift-icon"><i class="fas fa-gift"></i></div>
            <h2 class="gift-txt">QUÀ TẶNG THÀNH VIÊN MỚI</h2>
            <p style="color: var(--gold); font-weight: bold; margin-top: 10px;">NHẤN ĐỂ NHẬN 50.000đ</p>
        </div>
    </div>

    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 45px; height: 45px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="fas fa-user-tie" style="color: var(--gold);"></i></div>
            <div>
                <p id="u_phone" style="font-weight: 900; font-size: 14px;">09x.xxx.xxxx</p>
                <p style="font-size: 9px; color: var(--green);">THÀNH VIÊN CHÍNH THỨC</p>
            </div>
        </div>
        <i class="fas fa-bell" style="color: #444;"></i>
    </header>

    <div class="wallet-card">
        <p style="font-size: 10px; color: #666; letter-spacing: 2px;">VỐN ĐẦU TƯ HIỆN CÓ</p>
        <h1 class="balance-val" id="u_balance">0đ</h1>
        <div class="action-grid">
            <a href="nap.html" class="btn-main btn-gold"><i class="fas fa-plus-circle"></i> NẠP TIỀN</a>
            <a href="rut.html" class="btn-main btn-dark"><i class="fas fa-wallet"></i> RÚT TIỀN</a>
        </div>
    </div>

    <h3 style="margin: 20px; font-family: 'Orbitron'; font-size: 16px;">GÓI ĐẦU TƯ BETA</h3>
    <div class="package-list" id="p_list"></div>

    <div class="tele-float">
        <a href="https://t.me/Officiallsupports" target="_blank" class="tele-btn"><i class="fab fa-telegram-plane"></i></a>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-tab active"><i class="fas fa-home"></i><span>Trang Chủ</span></a>
        <a href="lichsu.html" class="nav-tab"><i class="fas fa-history"></i><span>Lịch Sử</span></a>
        <a href="ref.html" class="nav-tab"><i class="fas fa-users"></i><span>Đội Ngũ</span></a>
        <a href="#" onclick="logout()" class="nav-tab"><i class="fas fa-power-off"></i><span>Thoát</span></a>
    </nav>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://fgartftwimourooudcrp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o')

        const phone = localStorage.getItem('user_session');
        let userData = null;

        const packs = [
            { n: 'BETA 1', p: 90000 }, { n: 'BETA 2', p: 200000 }, { n: 'BETA 3', p: 500000 },
            { n: 'BETA 4', p: 1000000 }, { n: 'BETA 5', p: 3000000 }, { n: 'BETA 6', p: 5000000 }, { n: 'BETA 7', p: 8000000 }
        ];

        window.onload = async () => {
            if(!phone) { window.location.href = 'login.html'; return; }
            document.getElementById('u_phone').innerText = "ID: " + phone;
            
            const { data } = await supabase.from('users').select('*').eq('phone', phone).single();
            if(data) {
                userData = data;
                updateBalance(data.balance);
                // Kiểm tra xem đã nhận quà chưa (Sử dụng cột is_gift_claimed trong Database)
                if(!data.is_gift_claimed) {
                    document.getElementById('gift-overlay').style.display = 'flex';
                }
            }
            renderPacks();
        }

        window.claimGift = async () => {
            const { error } = await supabase.from('users').update({ 
                balance: userData.balance + 50000, 
                is_gift_claimed: true 
            }).eq('phone', phone);
            
            if(!error) {
                alert("Chúc mừng! Bạn đã nhận được 50.000đ tiền thưởng tân thủ.");
                location.reload();
            }
        }

        function renderPacks() {
            document.getElementById('p_list').innerHTML = packs.map(p => `
                <div class="p-card">
                    <p style="font-weight: 800; opacity: 0.6;">${p.n}</p>
                    <p class="p-price">${p.p.toLocaleString()}đ</p>
                    <button class="btn-buy" onclick="buy('${p.n}', ${p.p})">ĐẦU TƯ NGAY</button>
                </div>
            `).join('');
        }

        window.buy = async (n, p) => {
            if(userData.balance < p) return alert("Số dư không đủ!");
            if(!confirm(`Xác nhận đầu tư gói ${n}?`)) return;
            
            const { error } = await supabase.from('users').update({ balance: userData.balance - p, has_invested: true }).eq('phone', phone);
            if(!error) {
                await supabase.from('history').insert([{ phone, type: 'Mua ' + n, amount: p, status: 'Thành công' }]);
                alert("Đầu tư thành công!"); location.reload();
            }
        }

        function updateBalance(val) {
            document.getElementById('u_balance').innerText = val.toLocaleString() + "đ";
        }

        window.logout = () => { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
