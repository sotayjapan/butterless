<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM ADMIN MOBILE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #FFD700;
            --bg: #000;
            --card: #111;
            --border: #222;
            --green: #00ff88;
            --red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding-bottom: 100px; }

        /* HEADER */
        header {
            padding: 15px 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h2 { font-family: 'Orbitron'; font-size: 14px; color: var(--gold); letter-spacing: 1px; }

        /* STATS GRID */
        .stats-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px;
        }
        .stat-box {
            background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border);
            text-align: center;
        }
        .stat-box p { font-size: 9px; color: #666; font-family: 'Orbitron'; margin-bottom: 5px; }
        .stat-box h3 { font-family: 'Orbitron'; font-size: 14px; color: var(--gold); }

        /* CONTENT SECTIONS */
        .content-section { padding: 10px 15px; display: none; }
        .content-section.active { display: block; }

        /* CARD STYLE FOR DATA (Thay thế cho Table trên Mobile) */
        .data-card {
            background: var(--card); border-radius: 15px; border: 1px solid var(--border);
            padding: 15px; margin-bottom: 10px; position: relative;
        }
        .card-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .card-label { color: #555; font-weight: 700; text-transform: uppercase; font-size: 10px; }
        .card-val { font-weight: 600; color: #eee; }
        
        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: #080808; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { color: #444; text-align: center; font-size: 9px; text-decoration: none; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-size: 18px; margin-bottom: 5px; display: block; }

        /* BUTTONS */
        .btn-action {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            font-family: 'Orbitron'; font-weight: 900; font-size: 11px; margin-top: 5px;
        }
        .btn-green { background: var(--green); color: #000; }
        .btn-gold { background: var(--gold); color: #000; }

        /* SEARCH BAR */
        .search-bar { padding: 0 15px 10px; }
        .search-bar input {
            width: 100%; background: #0a0a0a; border: 1px solid var(--border); padding: 12px;
            border-radius: 10px; color: #fff; outline: none;
        }
    </style>
</head>
<body>

    <header>
        <h2>QUANTUM ADMIN</h2>
        <i class="fas fa-sync-alt" style="color:var(--gold)" onclick="refreshData()"></i>
    </header>

    <div class="stats-container">
        <div class="stat-box"><p>THÀNH VIÊN</p><h3 id="stat-u">0</h3></div>
        <div class="stat-box"><p>ĐẦU TƯ</p><h3 id="stat-i">0đ</h3></div>
        <div class="stat-box"><p>NẠP CHỜ</p><h3 id="stat-nd" style="color:var(--green)">0</h3></div>
        <div class="stat-box"><p>RÚT CHỜ</p><h3 id="stat-wd" style="color:var(--red)">0</h3></div>
    </div>

    <div id="section-users" class="content-section active">
        <div class="search-bar"><input type="text" id="find-u" placeholder="Tìm SĐT..." oninput="filterCards('list-u', this.value)"></div>
        <div id="list-u"></div>
    </div>

    <div id="section-dep" class="content-section">
        <div id="list-dep"></div>
    </div>

    <div id="section-draw" class="content-section">
        <div id="list-draw"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="showPanel('users', this)"><i class="fas fa-users"></i><span>Khách</span></div>
        <div class="nav-btn" onclick="showPanel('dep', this)"><i class="fas fa-wallet"></i><span>Duyệt Nạp</span></div>
        <div class="nav-btn" onclick="showPanel('draw', this)"><i class="fas fa-money-check-alt"></i><span>Duyệt Rút</span></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://fgartftwimourooudcrp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o');

        window.showPanel = (id, btn) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-'+id).classList.add('active');
            btn.classList.add('active');
        }

        async function refreshData() {
            const { data: users } = await supabase.from('users').select('*').order('created_at', {ascending: false});
            const { data: logs } = await supabase.from('history').select('*').order('created_at', {ascending: false});

            if(users) {
                document.getElementById('stat-u').innerText = users.length;
                document.getElementById('list-u').innerHTML = users.map(u => `
                    <div class="data-card">
                        <div class="card-row"><span class="card-label">SĐT:</span><span class="card-val" style="color:var(--gold)">${u.phone}</span></div>
                        <div class="card-row"><span class="card-label">Pass:</span><span class="card-val">${u.password}</span></div>
                        <div class="card-row"><span class="card-label">Số dư:</span><span class="card-val" style="color:var(--green)">${u.balance.toLocaleString()}đ</span></div>
                        <button class="btn-action btn-gold" onclick="editBal('${u.phone}', ${u.balance})">SỬA SỐ DƯ</button>
                    </div>
                `).join('');
            }

            if(logs) {
                const dep = logs.filter(l => l.type.includes('Nạp'));
                const draw = logs.filter(l => l.type.includes('Rút'));
                
                document.getElementById('stat-nd').innerText = dep.filter(x => x.status === 'Chờ duyệt').length;
                document.getElementById('stat-wd').innerText = draw.filter(x => x.status === 'Chờ duyệt').length;

                document.getElementById('list-dep').innerHTML = dep.map(l => `
                    <div class="data-card">
                        <div class="card-row"><span class="card-label">Khách:</span><span>${l.phone}</span></div>
                        <div class="card-row"><span class="card-label">Số tiền:</span><b style="color:var(--green)">+${l.amount.toLocaleString()}đ</b></div>
                        <div class="card-row"><span class="card-label">Trạng thái:</span><span>${l.status}</span></div>
                        ${l.status === 'Chờ duyệt' ? `<button class="btn-action btn-green" onclick="approveD('${l.id}','${l.phone}',${l.amount})">XÁC NHẬN NẠP</button>` : ''}
                    </div>
                `).join('');

                document.getElementById('list-draw').innerHTML = draw.map(l => `
                    <div class="data-card">
                        <div class="card-row"><span class="card-label">Khách:</span><span>${l.phone}</span></div>
                        <div class="card-row"><span class="card-label">Rút về:</span><b style="color:var(--red)">-${l.amount.toLocaleString()}đ</b></div>
                        <div class="card-row" style="font-size:10px; color:#555"><span>${l.note}</span></div>
                        ${l.status === 'Chờ duyệt' ? `<button class="btn-action btn-green" onclick="approveW('${l.id}')">XÁC NHẬN RÚT</button>` : '<b style="color:var(--green); font-size:10px">ĐÃ DUYỆT</b>'}
                    </div>
                `).join('');
            }
        }

        window.editBal = async (p, b) => {
            const n = prompt("Số dư mới cho " + p, b);
            if(n) { await supabase.from('users').update({ balance: parseInt(n) }).eq('phone', p); refreshData(); }
        }

        window.approveD = async (id, p, a) => {
            if(!confirm("Nạp " + a + "đ cho " + p + "?")) return;
            const { data:u } = await supabase.from('users').select('balance').eq('phone', p).single();
            await supabase.from('users').update({ balance: u.balance + a }).eq('phone', p);
            await supabase.from('history').update({ status: 'Thành công' }).eq('id', id);
            refreshData();
        }

        window.approveW = async (id) => {
            if(!confirm("Duyệt rút tiền này?")) return;
            await supabase.from('history').update({ status: 'Thành công' }).eq('id', id);
            refreshData();
        }

        window.filterCards = (id, val) => {
            const cards = document.getElementById(id).children;
            for(let c of cards) { c.style.display = c.innerText.includes(val) ? '' : 'none'; }
        }

        window.onload = refreshData;
    </script>
</body>
</html>
