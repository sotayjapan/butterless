<div class="container">
    <div id="step-1" class="deposit-card animate__animated animate__zoomIn">
        <span class="label">Mời chọn gói đầu tư VIP</span>
        <div class="amount-box">
            <input type="number" id="inp-amt" value="90000">
        </div>

        <div class="package-grid">
            <button class="p-btn active" onclick="setPkg(90000)"><b>90.000</b><span>Gói 1</span></button>
            <button class="p-btn" onclick="setPkg(200000)"><b>200.000</b><span>Gói 2</span></button>
            <button class="p-btn" onclick="setPkg(500000)"><b>500.000</b><span>Gói 3</span></button>
            <button class="p-btn" onclick="setPkg(1000000)"><b>1.000.000</b><span>Gói 4</span></button>
            <button class="p-btn" onclick="setPkg(3000000)"><b>3.000.000</b><span>Gói 5</span></button>
            <button class="p-btn" onclick="setPkg(5000000)"><b>5.000.000</b><span>Gói 6</span></button>
            <button class="p-btn" style="grid-column: span 2;" onclick="setPkg(8000000)"><b>8.000.000</b><span>Gói 7</span></button>
        </div>

        <button class="btn-main" onclick="goNext()">TIẾP TỤC <i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="payment-area" style="display: none;" class="deposit-card animate__animated animate__fadeInUp">
        <div class="qr-area">
            <img src="qr-image.png" alt="QR BIDV">
        </div>

        <div class="info-row"><span>Ngân hàng</span><b>BIDV</b></div>
        <div class="info-row"><span>Số tài khoản</span><b style="letter-spacing:1px">8883214078</b></div>
        <div class="info-row"><span>Chủ tài khoản</span><b>NGUYEN VAN NAM</b></div>
        <div class="info-row"><span>Số tiền</span><b class="gold-text" id="final-amt">0đ</b></div>
        <div class="info-row"><span>Nội dung</span><b class="gold-text" id="final-memo">---</b></div>

        <button class="btn-main" id="btn-confirm" onclick="confirmPayment()">
            XÁC NHẬN ĐÃ CHUYỂN <i class="fas fa-check-circle"></i>
        </button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://fgartftwimourooudcrp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYXJ0ZnR3aW1vdXJvb3VkY3JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjcwNjAsImV4cCI6MjA4OTIwMzA2MH0.OY9xaxGcir8U4BeoUDg1BOOeNTEM4LRhpftAZruBb8o');

    const phone = localStorage.getItem('user_session');

    // Tự động đồng bộ số tiền từ trang chủ gửi sang
    window.onload = () => {
        const urlAmt = localStorage.getItem('temp_deposit_amt');
        if (urlAmt) {
            document.getElementById('inp-amt').value = urlAmt;
            syncActiveButton(urlAmt);
        }
    };

    window.setPkg = (amt) => {
        document.getElementById('inp-amt').value = amt;
        syncActiveButton(amt);
    };

    function syncActiveButton(amt) {
        document.querySelectorAll('.p-btn').forEach(b => {
            const val = b.querySelector('b').innerText.replace(/\./g, '');
            if(val == amt) b.classList.add('active');
            else b.classList.remove('active');
        });
    }

    window.goNext = () => {
        const val = document.getElementById('inp-amt').value;
        if(val < 90000) return alert("Số tiền nạp tối thiểu là 90,000đ");
        
        document.getElementById('final-amt').innerText = Number(val).toLocaleString() + "đ";
        document.getElementById('final-memo').innerText = "NAP " + phone;
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('payment-area').style.display = 'block';
    };

    window.confirmPayment = async () => {
        const val = document.getElementById('inp-amt').value;
        const btn = document.getElementById('btn-confirm');
        
        // Hiệu ứng loading trên nút
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> ĐANG XỬ LÝ...';
        btn.style.opacity = '0.7';
        btn.style.pointerEvents = 'none';

        const { error } = await supabase.from('history').insert([{
            phone: phone,
            type: 'Nạp tiền',
            amount: parseInt(val),
            status: 'Chờ duyệt'
        }]);

        if(!error) {
            // Thông báo thông minh
            alert("✅ Xác nhận thành công! Tiền sẽ vào tài khoản trong giây lát. Hệ thống đang chuyển hướng...");
            
            // Xóa bộ nhớ tạm số tiền nạp
            localStorage.removeItem('temp_deposit_amt');
            
            // Đợi 1.5 giây rồi về trang chủ cho mượt
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            alert("Lỗi kết nối database!");
            btn.innerHTML = 'XÁC NHẬN ĐÃ CHUYỂN <i class="fas fa-check-circle"></i>';
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
        }
    };
</script>
